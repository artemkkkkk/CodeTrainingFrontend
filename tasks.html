<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Задачи — CodeCamp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      padding: 40px 20px;
      color: white;
    }
    .container { max-width: 1000px; margin: 0 auto; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 15px;
    }
    .logo {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f6d365, #fda085);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .nav-buttons { display: flex; gap: 10px; }
    .nav-btn {
      background: rgba(255,255,255,0.08);
      padding: 10px 20px;
      border-radius: 10px;
      text-decoration: none;
      color: white;
      transition: 0.3s;
    }
    .nav-btn.active, .nav-btn:hover {
      background: rgba(246,211,101,0.2);
      color: #f6d365;
    }
    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-btn, .tag-select {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      color: #a0a0b8;
    }
    .filter-btn.active, .filter-btn:hover {
      background: rgba(246,211,101,0.15);
      color: #f6d365;
    }
    .tag-select {
      background: rgba(255,255,255,0.1);
      margin-left: auto;
    }
    .task-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 18px 22px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: 0.3s;
      text-decoration: none;
      color: white;
    }
    .task-card:hover {
      background: rgba(255,255,255,0.08);
      transform: translateX(5px);
    }
    .task-info h3 { margin-bottom: 6px; }
    .task-meta {
      display: flex;
      gap: 15px;
      font-size: 0.85rem;
      color: #9090aa;
      flex-wrap: wrap;
    }
    .task-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .tag {
      background: rgba(246,211,101,0.15);
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 0.7rem;
      color: #f6d365;
    }
    .difficulty-badge {
      padding: 5px 12px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .easy { background: rgba(40,167,69,0.2); color: #28a745; }
    .medium { background: rgba(255,193,7,0.2); color: #ffc107; }
    .hard { background: rgba(220,53,69,0.2); color: #dc3545; }
    .pagination {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 30px;
    }
    .page-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }
    .page-btn.active {
      background: #f6d365;
      color: #1a1a2e;
    }
    .empty-state { text-align: center; padding: 60px; }
    .loading { text-align: center; padding: 40px; font-size: 1.2rem; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">&lt;CodeCamp/&gt;</div>
    <div class="nav-buttons">
      <a href="tasks.html" class="nav-btn active">📋 Задачи</a>
      <a href="create.html" class="nav-btn">✏️ Создать</a>
      <a href="profile.html" class="nav-btn">👤 Профиль</a>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-diff="all">Все</button>
    <button class="filter-btn" data-diff="easy">Легкие</button>
    <button class="filter-btn" data-diff="medium">Средние</button>
    <button class="filter-btn" data-diff="hard">Сложные</button>
    <select id="tagFilter" class="tag-select">
      <option value="">Все теги</option>
    </select>
  </div>

  <div id="tasksList"><div class="loading">Загрузка задач...</div></div>
  <div id="pagination" class="pagination"></div>
</div>

<script>
  const API_BASE = 'http://localhost:8000/api/v1';
  let USE_API = true;
  let allTasks = [];
  let currentOffset = 0;
  const limit = 10;
  let currentDifficulty = 'all';
  let currentTag = '';

  function getToken() { return localStorage.getItem('token'); }
  if (!getToken() && !localStorage.getItem('codecamp_current')) window.location.replace('index.html');

  async function apiRequest(url, options = {}) {
    const headers = { 'Content-Type': 'application/json' };
    const token = getToken();
    if (token) headers['Authorization'] = `Bearer ${token}`;
    const res = await fetch(API_BASE + url, { ...options, headers });
    if (!res.ok) throw new Error(await res.text());
    return await res.json();
  }

  async function loadTasksFromAPI() {
    const params = new URLSearchParams();
    params.append('offset', '0');
    params.append('limit', '1000');
    if (currentDifficulty !== 'all') params.append('difficult', currentDifficulty);
    if (currentTag) params.append('tags', currentTag);
    const data = await apiRequest(`/tasks?${params.toString()}`);
    allTasks = data.tasks || [];
    applyFilters();
  }

  function getLocalTasks() {
    return JSON.parse(localStorage.getItem('codecamp_tasks') || '[]');
  }

  async function loadTasks() {
    try {
      if (USE_API) {
        await loadTasksFromAPI();
      } else {
        allTasks = getLocalTasks();
        applyFilters();
      }
    } catch (e) {
      console.warn('API error, using localStorage', e);
      USE_API = false;
      allTasks = getLocalTasks();
      applyFilters();
    }
  }

  function applyFilters() {
    let filtered = [...allTasks];
    if (currentDifficulty !== 'all')
      filtered = filtered.filter(t => t.difficult === currentDifficulty);
    if (currentTag)
      filtered = filtered.filter(t => t.tags && t.tags.includes(currentTag));
    filtered.sort((a,b) => {
      if (a.complete !== b.complete) return (b.complete || 0) - (a.complete || 0);
      return (a.name || '').localeCompare(b.name || '');
    });
    renderTasks(filtered);
    updateTagOptions(filtered);
  }

  function updateTagOptions(tasks) {
    const tagsSet = new Set();
    tasks.forEach(t => (t.tags || []).forEach(tag => tagsSet.add(tag)));
    // Если нет ни одной задачи, покажем все возможные теги (из списка)
    if (tagsSet.size === 0) {
      const allPossibleTags = ["array", "hashmap", "string", "tree", "recursion", "sort", "dynamic", "two_pointers"];
      allPossibleTags.forEach(t => tagsSet.add(t));
    }
    const select = document.getElementById('tagFilter');
    const current = select.value;
    select.innerHTML = '<option value="">Все теги</option>';
    Array.from(tagsSet).sort().forEach(tag => {
      select.innerHTML += `<option value="${tag}">${tag}</option>`;
    });
    if (current && tagsSet.has(current)) select.value = current;
    else select.value = '';
  }

  function renderTasks(tasks) {
    const start = currentOffset;
    const end = start + limit;
    const pageTasks = tasks.slice(start, end);
    const container = document.getElementById('tasksList');
    if (pageTasks.length === 0) {
      container.innerHTML = '<div class="empty-state">📭 Нет задач</div>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }
    container.innerHTML = pageTasks.map(task => `
      <a href="solve.html?name=${encodeURIComponent(task.name)}" class="task-card">
        <div class="task-info">
          <h3>${escapeHtml(task.name)}</h3>
          <div class="task-meta">
            <span>👤 ${escapeHtml(task.author || 'admin')}</span>
            <span>✅ Решили: ${task.complete || 0}</span>
            <span>📅 ${new Date(task.createdAt).toLocaleDateString()}</span>
          </div>
          <div class="task-tags">
            ${(task.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}
          </div>
        </div>
        <span class="difficulty-badge ${task.difficult}">
          ${task.difficult === 'easy' ? 'Легкая' : task.difficult === 'medium' ? 'Средняя' : 'Сложная'}
        </span>
      </a>
    `).join('');
    renderPagination(tasks.length);
  }

  function renderPagination(total) {
    const totalPages = Math.ceil(total / limit);
    const container = document.getElementById('pagination');
    if (totalPages <= 1) { container.innerHTML = ''; return; }
    let html = '';
    for (let i = 0; i < totalPages; i++) {
      html += `<button class="page-btn ${i === currentOffset/limit ? 'active' : ''}" data-page="${i}">${i+1}</button>`;
    }
    container.innerHTML = html;
    document.querySelectorAll('.page-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentOffset = parseInt(btn.dataset.page) * limit;
        applyFilters();
      });
    });
  }

  function escapeHtml(s) { return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[c]); }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentDifficulty = btn.dataset.diff;
      currentOffset = 0;
      loadTasks();
    });
  });
  document.getElementById('tagFilter').addEventListener('change', (e) => {
    currentTag = e.target.value;
    currentOffset = 0;
    loadTasks();
  });

  loadTasks();
</script>
</body>
</html>
