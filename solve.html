<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Решение задачи — CodeCamp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      padding: 40px 20px;
      color: white;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
    .back-btn {
      grid-column: 1/-1;
      background: rgba(255,255,255,0.05);
      border: none;
      color: white;
      padding: 10px 20px;
      border-radius: 10px;
      width: fit-content;
      cursor: pointer;
      text-decoration: none;
    }
    .task-panel, .code-panel {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 30px;
    }
    .task-title {
      font-size: 1.8rem;
      background: linear-gradient(135deg, #f6d365, #fda085);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .difficulty-badge {
      padding: 5px 12px;
      border-radius: 12px;
      display: inline-block;
      margin: 10px 0;
    }
    .easy { background: rgba(40,167,69,0.2); color: #28a745; }
    .medium { background: rgba(255,193,7,0.2); color: #ffc107; }
    .hard { background: rgba(220,53,69,0.2); color: #dc3545; }
    .task-description { margin: 20px 0; line-height: 1.6; white-space: pre-wrap; }
    .code-editor {
      width: 100%;
      min-height: 300px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px;
      color: #e0e0e0;
      font-family: monospace;
      margin-bottom: 20px;
    }
    .submit-btn {
      width: 100%;
      background: linear-gradient(135deg, #4CAF50, #45a049);
      border: none;
      padding: 16px;
      border-radius: 12px;
      font-weight: 700;
      color: white;
      cursor: pointer;
    }
    .message {
      margin-top: 15px;
      padding: 12px;
      border-radius: 8px;
    }
    .success { background: rgba(40,167,69,0.2); color: #28a745; }
    .error { background: rgba(220,53,69,0.2); color: #dc3545; }
    .info { background: rgba(255,193,7,0.2); color: #ffc107; }
    .comments-section {
      grid-column: 1/-1;
      background: rgba(255,255,255,0.04);
      border-radius: 20px;
      padding: 20px;
      margin-top: 20px;
    }
    .comment {
      padding: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .load-more {
      background: none;
      border: 1px solid #f6d365;
      color: #f6d365;
      padding: 8px 20px;
      border-radius: 20px;
      cursor: pointer;
      margin-top: 10px;
    }
    .loading { text-align: center; padding: 40px; }
  </style>
</head>
<body>
<div class="container">
  <a href="tasks.html" class="back-btn">← Назад к задачам</a>
  <div class="task-panel" id="taskPanel"><div class="loading">Загрузка задачи...</div></div>
  <div class="code-panel">
    <h3>💻 Ваше решение</h3>
    <textarea class="code-editor" id="codeEditor" placeholder='Напишите функцию solution(input) и верните результат.&#10;Пример:&#10;function solution(input) {&#10;  return input.toUpperCase();&#10;}'></textarea>
    <button class="submit-btn" id="submitBtn">✅ Отправить решение</button>
    <div id="solutionMessage"></div>
  </div>
  <div class="comments-section" id="commentsSection">
    <h3>💬 Комментарии</h3>
    <div id="commentsList"></div>
    <button id="loadMoreComments" class="load-more" style="display:none">Загрузить ещё</button>
  </div>
</div>

<script>
  const API_BASE = 'http://localhost:8000/api/v1';
  let USE_API = true;

  function getToken() { return localStorage.getItem('token'); }
  if (!getToken() && !localStorage.getItem('codecamp_current')) window.location.replace('index.html');

  async function apiRequest(url, options = {}) {
    const headers = { 'Content-Type': 'application/json' };
    const token = getToken();
    if (token) headers['Authorization'] = `Bearer ${token}`;
    const res = await fetch(API_BASE + url, { ...options, headers });
    if (!res.ok) throw new Error(await res.text());
    return await res.json();
  }

  const urlParams = new URLSearchParams(window.location.search);
  const taskName = urlParams.get('name');
  if (!taskName) {
    document.getElementById('taskPanel').innerHTML = '<div class="error">Задача не указана</div>';
    throw new Error('No task name');
  }

  let currentTask = null;
  let hiddenTestCases = [];

  // Загрузка задачи: сначала пробуем GET /tasks/{name}, если нет – загружаем все
  async function loadTask() {
    try {
      if (USE_API) {
        const task = await apiRequest(`/tasks/${encodeURIComponent(taskName)}`);
        currentTask = task;
        hiddenTestCases = task.testCases || [];
        renderTaskDescription();
        return;
      }
    } catch (e) {
      console.warn('Single task endpoint failed, trying list', e);
    }
    // Fallback: грузим все задачи и ищем по имени
    const allTasks = await apiRequest('/tasks?offset=0&limit=1000');
    const found = (allTasks.tasks || []).find(t => t.name === taskName);
    if (!found) throw new Error('Задача не найдена');
    currentTask = found;
    hiddenTestCases = currentTask.testCases || [];
    renderTaskDescription();
  }

  function renderTaskDescription() {
    const panel = document.getElementById('taskPanel');
    panel.innerHTML = `
      <h1 class="task-title">${escapeHtml(currentTask.name)}</h1>
      <div class="difficulty-badge ${currentTask.difficult}">
        ${currentTask.difficult === 'easy' ? 'Легкая' : currentTask.difficult === 'medium' ? 'Средняя' : 'Сложная'}
      </div>
      <div style="margin: 10px 0">✅ Решили: ${currentTask.complete || 0}</div>
      <div class="task-description">${escapeHtml(currentTask.description)}</div>
      ${(currentTask.tags || []).length ? `
        <div style="margin-top: 15px">
          ${currentTask.tags.map(t => `<span class="tag" style="background:rgba(246,211,101,0.15); padding:2px 8px; border-radius:12px; margin-right:6px;">${escapeHtml(t)}</span>`).join('')}
        </div>
      ` : ''}
    `;
  }

  // Проверка решения (локально, пока бэкенд не возвращает результат асинхронно)
  function testSolutionLocally(code, testCases) {
    let fn;
    try {
      const wrapped = `return (function() { ${code}; return solution; })();`;
      fn = new Function(wrapped)();
      if (typeof fn !== 'function') throw new Error('Функция solution не определена');
    } catch (err) {
      return { passed: false, error: `Ошибка в коде: ${err.message}` };
    }
    const results = [];
    let allPassed = true;
    for (let i = 0; i < testCases.length; i++) {
      const tc = testCases[i];
      try {
        const output = fn(tc.wanted_input);
        const expected = String(tc.wanted_output).trim();
        const actual = String(output).trim();
        if (actual !== expected) allPassed = false;
        results.push({ testNum: i+1, passed: actual === expected, expected, actual });
      } catch (err) {
        allPassed = false;
        results.push({ testNum: i+1, passed: false, error: err.message });
      }
    }
    return { passed: allPassed, results };
  }

  async function submitSolution() {
    const code = document.getElementById('codeEditor').value;
    const msgDiv = document.getElementById('solutionMessage');
    if (!code.trim()) {
      msgDiv.className = 'message error';
      msgDiv.textContent = '❌ Напишите решение';
      return;
    }
    msgDiv.innerHTML = '⏳ Отправка решения...';
    msgDiv.className = 'message info';

    try {
      // Отправляем решение в бэкенд
      if (USE_API) {
        await apiRequest('/submissions', {
          method: 'POST',
          body: JSON.stringify({ task_name: taskName, code })
        });
        msgDiv.innerHTML = '✅ Решение принято! Ожидайте результатов проверки.';
        // Здесь нужно периодически опрашивать /submissions/{id}, но пока нет
        // Поэтому добавим локальную проверку для демонстрации (позже убрать)
        if (hiddenTestCases.length) {
          setTimeout(() => {
            const localResult = testSolutionLocally(code, hiddenTestCases);
            if (localResult.passed) {
              msgDiv.className = 'message success';
              msgDiv.innerHTML = '✅ Все тесты пройдены! Решение засчитано.';
              // Обновить solved count на странице
              const solvedSpan = document.querySelector('.task-panel div:nth-of-type(2)');
              if (solvedSpan && solvedSpan.innerText.includes('Решили:')) {
                const newCount = (currentTask.complete || 0) + 1;
                solvedSpan.innerText = `✅ Решили: ${newCount}`;
              }
            } else {
              msgDiv.className = 'message error';
              msgDiv.innerHTML = `❌ Решение не прошло тесты.<br><pre>${escapeHtml(localResult.results.filter(r=>!r.passed).map(r=>r.error || `Тест ${r.testNum}: ожидалось ${r.expected}, получено ${r.actual}`).join('\n'))}</pre>`;
            }
          }, 2000);
        }
      } else {
        // fallback локальная проверка
        if (!hiddenTestCases.length) throw new Error('Нет тест-кейсов');
        const result = testSolutionLocally(code, hiddenTestCases);
        if (result.passed) {
          msgDiv.className = 'message success';
          msgDiv.innerHTML = '✅ Все тесты пройдены! Решение засчитано.';
        } else {
          msgDiv.className = 'message error';
          msgDiv.innerHTML = `❌ Решение не прошло тесты.<br><pre>${escapeHtml(result.results.filter(r=>!r.passed).map(r=>r.error || `Тест ${r.testNum}: ожидалось ${r.expected}, получено ${r.actual}`).join('\n'))}</pre>`;
        }
      }
    } catch (err) {
      msgDiv.className = 'message error';
      msgDiv.innerHTML = '❌ Ошибка отправки: ' + err.message;
    }
  }

  // Комментарии (заглушка, но можно расширить)
  let commentOffset = 0;
  let commentLimit = 5;
  let hasMoreComments = true;
  async function loadComments(reset = true) {
    if (reset) { commentOffset = 0; hasMoreComments = true; document.getElementById('commentsList').innerHTML = ''; }
    if (!hasMoreComments) return;
    try {
      const data = await apiRequest(`/tasks/${encodeURIComponent(taskName)}/comments?offset=${commentOffset}&limit=${commentLimit}`);
      const comments = data.comments || [];
      if (comments.length < commentLimit) hasMoreComments = false;
      const container = document.getElementById('commentsList');
      comments.forEach(c => {
        const div = document.createElement('div');
        div.className = 'comment';
        div.innerHTML = `<strong>${escapeHtml(c.author_name)}</strong> <span style="color:#9090aa">${new Date(c.date).toLocaleString()}</span><br>${escapeHtml(c.text)}`;
        container.appendChild(div);
      });
      commentOffset += comments.length;
      document.getElementById('loadMoreComments').style.display = hasMoreComments ? 'block' : 'none';
    } catch (e) {
      console.warn('Comments not available');
      document.getElementById('commentsList').innerHTML = '<div>Комментарии временно недоступны</div>';
    }
  }

  function escapeHtml(s) { return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[c]); }

  document.getElementById('submitBtn').addEventListener('click', submitSolution);
  document.getElementById('loadMoreComments').addEventListener('click', () => loadComments(false));
  loadTask().then(() => loadComments()).catch(err => {
    document.getElementById('taskPanel').innerHTML = `<div class="error">${err.message}</div>`;
  });
</script>
</body>
</html>
