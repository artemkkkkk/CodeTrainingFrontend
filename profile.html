<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Профиль — CodeCamp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      padding: 40px 20px;
      color: white;
    }
    .container { max-width: 600px; margin: 0 auto; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }
    .logo {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f6d365, #fda085);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .nav-buttons { display: flex; gap: 10px; }
    .nav-btn {
      background: rgba(255,255,255,0.08);
      padding: 10px 20px;
      border-radius: 10px;
      text-decoration: none;
      color: white;
    }
    .nav-btn.active, .nav-btn:hover { background: rgba(246,211,101,0.2); color: #f6d365; }
    .profile-card {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      border-radius: 28px;
      padding: 40px;
    }
    .avatar {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #f6d365, #fda085);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: 700;
      color: #1a1a2e;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin: 28px 0;
    }
    .stat-box {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
    }
    .stat-number {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f6d365, #fda085);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logout-btn {
      width: 100%;
      background: rgba(255,90,90,0.15);
      border: 1px solid rgba(255,90,90,0.3);
      color: #ff7070;
      padding: 15px;
      border-radius: 12px;
      cursor: pointer;
    }
    .loading { text-align: center; padding: 40px; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">&lt;CodeCamp/&gt;</div>
    <div class="nav-buttons">
      <a href="tasks.html" class="nav-btn">📋 Задачи</a>
      <a href="create.html" class="nav-btn">✏️ Создать</a>
      <a href="profile.html" class="nav-btn active">👤 Профиль</a>
    </div>
  </div>
  <div class="profile-card">
    <div id="profileContent"><div class="loading">Загрузка...</div></div>
    <button class="logout-btn" id="logoutBtn">🚪 Выйти</button>
  </div>
</div>

<script>
  const API_BASE = 'http://localhost:8000/api/v1';
  function getToken() { return localStorage.getItem('token'); }
  if (!getToken() && !localStorage.getItem('codecamp_current')) window.location.replace('index.html');

  async function loadProfile() {
    try {
      const token = getToken();
      if (token) {
        const res = await fetch(`${API_BASE}/profile`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error(await res.text());
        const data = await res.json();
        document.getElementById('profileContent').innerHTML = `
          <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 30px;">
            <div class="avatar">${(data.name?.[0] || 'U').toUpperCase()}</div>
            <div><h2>${escapeHtml(data.name)}</h2><span style="color:#b0b0cc">${data.email || ''}</span></div>
          </div>
          <div class="stats-grid">
            <div class="stat-box"><div class="stat-number">${data.easy_tasks || 0}</div><div>Лёгкие</div></div>
            <div class="stat-box"><div class="stat-number">${data.medium_tasks || 0}</div><div>Средние</div></div>
            <div class="stat-box"><div class="stat-number">${data.hard_tasks || 0}</div><div>Сложные</div></div>
            <div class="stat-box"><div class="stat-number">${data.rating || 1200}</div><div>Рейтинг</div></div>
          </div>
        `;
      } else {
        // fallback localStorage
        const user = JSON.parse(localStorage.getItem('codecamp_current'));
        const users = JSON.parse(localStorage.getItem('codecamp_users') || '[]');
        const full = users.find(u => u.name === user.name) || { solvedTasks: 0, rating: 1200 };
        document.getElementById('profileContent').innerHTML = `
          <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 30px;">
            <div class="avatar">${(user.name?.[0] || 'U').toUpperCase()}</div>
            <div><h2>${escapeHtml(user.name)}</h2><span style="color:#b0b0cc">${user.email || ''}</span></div>
          </div>
          <div class="stats-grid">
            <div class="stat-box"><div class="stat-number">${full.solvedTasks || 0}</div><div>Решено задач</div></div>
            <div class="stat-box"><div class="stat-number">${full.rating || 1200}</div><div>Рейтинг</div></div>
          </div>
        `;
      }
    } catch (err) {
      document.getElementById('profileContent').innerHTML = `<div class="error">Ошибка загрузки профиля</div>`;
    }
  }

  function escapeHtml(s) { return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[c]); }

  document.getElementById('logoutBtn').addEventListener('click', () => {
    localStorage.removeItem('token');
    localStorage.removeItem('codecamp_current');
    window.location.replace('index.html');
  });
  loadProfile();
</script>
</body>
</html>
