<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Профиль — CodeCamp</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      padding: 40px 20px;
      color: white;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .profile-card {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(20px);
      border-radius: 28px;
      padding: 40px 36px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 25px 70px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.08);
      animation: fadeSlideUp 0.5s ease;
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(25px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f6d365, #fda085);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nav-btn {
      background: rgba(255, 255, 255, 0.08);
      border: none;
      color: white;
      padding: 8px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.3s;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .nav-btn:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .nav-btn.active {
      background: rgba(246, 211, 101, 0.2);
      color: #f6d365;
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 36px;
    }

    .avatar {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #f6d365, #fda085);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: 700;
      color: #1a1a2e;
      flex-shrink: 0;
    }

    .user-info h2 {
      font-size: 2rem;
      margin-bottom: 4px;
      word-break: break-word;
    }

    .user-email {
      color: #b0b0cc;
      font-size: 0.95rem;
      word-break: break-word;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin: 28px 0;
    }

    .stat-box {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 22px 18px;
      text-align: center;
      transition: transform 0.2s;
    }

    .stat-box:hover {
      transform: translateY(-3px);
    }

    .stat-number {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f6d365, #fda085);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-label {
      font-size: 0.85rem;
      color: #9090aa;
      margin-top: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .logout-btn {
      width: 100%;
      background: rgba(255, 90, 90, 0.15);
      border: 1px solid rgba(255, 90, 90, 0.3);
      color: #ff7070;
      padding: 15px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 8px;
    }

    .logout-btn:hover {
      background: rgba(255, 90, 90, 0.25);
      color: #ff9090;
      transform: translateY(-2px);
    }

    .welcome-badge {
      background: rgba(246, 211, 101, 0.1);
      border: 1px solid rgba(246, 211, 101, 0.3);
      color: #f6d365;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      display: inline-block;
      margin-bottom: 24px;
    }

    .loading {
      opacity: 0.6;
      pointer-events: none;
    }

    .error-message {
      background: rgba(255, 90, 90, 0.15);
      border: 1px solid rgba(255, 90, 90, 0.3);
      color: #ff7070;
      padding: 16px;
      border-radius: 12px;
      text-align: center;
      margin: 20px 0;
    }

    .registration-date {
      text-align: center;
      color: #9090aa;
      font-size: 0.8rem;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="profile-card" id="profileCard">
    <div class="header">
      <div class="logo">&lt;CodeCamp/&gt;</div>
      <div class="nav-buttons">
        <a href="tasks.html" class="nav-btn">📋 Задачи</a>
        <a href="create.html" class="nav-btn">✏️ Создать</a>
        <a href="profile.html" class="nav-btn active">👤 Профиль</a>
      </div>
    </div>

    <div class="welcome-badge">👋 Добро пожаловать</div>
    
    <div class="profile-header">
      <div class="avatar" id="avatarLetter">?</div>
      <div class="user-info">
        <h2 id="displayUsername">Загрузка...</h2>
        <span class="user-email" id="displayEmail"></span>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-number" id="solvedCount">0</div>
        <div class="stat-label">Решено задач</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="ratingValue">1200</div>
        <div class="stat-label">Рейтинг</div>
      </div>
    </div>

    <div id="errorContainer" style="display: none;"></div>

    <button class="logout-btn" id="logoutBtn">🚪 Выйти из аккаунта</button>
  </div>

  <script>
    (function() {
      // ---------- Проверка авторизации ----------
      let currentUser = null;
      
      try {
        const userData = localStorage.getItem('codecamp_current');
        if (!userData) {
          throw new Error('Нет данных авторизации');
        }
        
        currentUser = JSON.parse(userData);
        
        if (!currentUser || !currentUser.email) {
          throw new Error('Некорректные данные пользователя');
        }
      } catch (e) {
        console.error('Ошибка авторизации:', e);
        localStorage.removeItem('codecamp_current');
        window.location.replace('index.html');
        return;
      }

      // ---------- Загрузка данных пользователя из базы ----------
      function loadUserData() {
        try {
          const usersData = localStorage.getItem('codecamp_users');
          let users = [];
          
          if (usersData) {
            users = JSON.parse(usersData);
            if (!Array.isArray(users)) {
              users = [];
            }
          }
          
          const fullUser = users.find(u => u.email === currentUser.email);
          
          // Если пользователь не найден в базе, но есть в сессии
          if (!fullUser && users.length > 0) {
            showError('Профиль не найден в базе данных. Возможно, данные были удалены.');
            setTimeout(() => {
              localStorage.removeItem('codecamp_current');
              window.location.replace('index.html');
            }, 2000);
            return;
          }
          
          // Объединяем данные сессии и базы
          const userData = fullUser || currentUser;
          
          // Обновляем интерфейс
          updateUI(userData);
          
          // Обновляем данные сессии если они изменились
          if (fullUser) {
            localStorage.setItem('codecamp_current', JSON.stringify({
              username: fullUser.username,
              email: fullUser.email,
              id: fullUser.id
            }));
          }
          
          // Убираем состояние загрузки
          document.getElementById('profileCard').classList.remove('loading');
          
        } catch (e) {
          console.error('Ошибка загрузки данных:', e);
          showError('Ошибка загрузки профиля. Попробуйте перезайти.');
        }
      }

      function updateUI(user) {
        // Имя пользователя
        const username = user.username || 'Аноним';
        document.getElementById('displayUsername').textContent = username;
        
        // Email
        document.getElementById('displayEmail').textContent = user.email || 'email не указан';
        
        // Аватар
        document.getElementById('avatarLetter').textContent = username[0].toUpperCase();
        
        // Статистика
        document.getElementById('solvedCount').textContent = user.solved || 0;
        document.getElementById('ratingValue').textContent = user.rating || 1200;
        
        // Дата регистрации (если есть)
        if (user.createdAt) {
          const regDate = new Date(user.createdAt);
          let timeElement = document.querySelector('.registration-date');
          if (!timeElement) {
            timeElement = document.createElement('div');
            timeElement.classList.add('registration-date');
            const statsGrid = document.querySelector('.stats-grid');
            statsGrid.after(timeElement);
          }
          timeElement.textContent = `На CodeCamp с ${regDate.toLocaleDateString('ru-RU')}`;
        }
      }

      function showError(message) {
        const errorContainer = document.getElementById('errorContainer');
        errorContainer.style.display = 'block';
        errorContainer.className = 'error-message';
        errorContainer.innerHTML = `⚠️ ${message}`;
        
        setTimeout(() => {
          errorContainer.style.display = 'none';
        }, 5000);
      }

      // ---------- Обработчик выхода ----------
      function handleLogout() {
        if (confirm('Вы уверены, что хотите выйти из аккаунта?')) {
          localStorage.removeItem('codecamp_current');
          document.getElementById('profileCard').style.opacity = '0';
          document.getElementById('profileCard').style.transform = 'scale(0.95)';
          document.getElementById('profileCard').style.transition = 'all 0.3s ease';
          setTimeout(() => {
            window.location.replace('index.html');
          }, 300);
        }
      }

      // ---------- Инициализация ----------
      function init() {
        loadUserData();
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
          logoutBtn.addEventListener('click', handleLogout);
        }
        
        // Автоматическое обновление данных (каждые 30 секунд)
        setInterval(() => {
          const usersData = localStorage.getItem('codecamp_users');
          if (usersData) {
            try {
              const users = JSON.parse(usersData);
              const updatedUser = users.find(u => u.email === currentUser.email);
              if (updatedUser) {
                updateUI(updatedUser);
              }
            } catch (e) {
              // Игнорируем ошибки автообновления
            }
          }
        }, 30000);
      }

      init();
    })();
  </script>
</body>
</html>
