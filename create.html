<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Создать задачу — CodeCamp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      padding: 40px 20px;
      color: white;
    }
    .container { max-width: 800px; margin: 0 auto; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }
    .logo {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f6d365, #fda085);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .nav-buttons { display: flex; gap: 10px; }
    .nav-btn {
      background: rgba(255,255,255,0.08);
      padding: 10px 20px;
      border-radius: 10px;
      text-decoration: none;
      color: white;
    }
    .nav-btn.active, .nav-btn:hover { background: rgba(246,211,101,0.2); color: #f6d365; }
    .form-card {
      background: rgba(255,255,255,0.04);
      border-radius: 20px;
      padding: 30px;
    }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; color: #c4c4d4; }
    input, textarea, select {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 12px;
      border-radius: 12px;
      color: white;
    }
    .tags-group {
      margin-bottom: 20px;
    }
    .tags-checkboxes {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }
    .tag-checkbox {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.05);
      padding: 5px 10px;
      border-radius: 20px;
      cursor: pointer;
    }
    .tag-checkbox input { width: auto; margin: 0; }
    .testcase-block {
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
    }
    .add-btn {
      background: rgba(246,211,101,0.2);
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      color: #f6d365;
      cursor: pointer;
      margin-bottom: 20px;
    }
    .submit-btn {
      background: linear-gradient(135deg, #f6d365, #fda085);
      border: none;
      padding: 16px;
      border-radius: 12px;
      font-weight: 700;
      color: #1a1a2e;
      cursor: pointer;
      width: 100%;
    }
    .message { margin-top: 15px; padding: 12px; border-radius: 8px; }
    .success { background: rgba(40,167,69,0.2); color: #28a745; }
    .error { background: rgba(220,53,69,0.2); color: #dc3545; }
    .info-hint { font-size: 0.8rem; color: #9090aa; margin-top: 5px; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">&lt;CodeCamp/&gt;</div>
    <div class="nav-buttons">
      <a href="tasks.html" class="nav-btn">📋 Задачи</a>
      <a href="create.html" class="nav-btn active">✏️ Создать</a>
      <a href="profile.html" class="nav-btn">👤 Профиль</a>
    </div>
  </div>
  <div class="form-card">
    <h2>📝 Создать новую задачу</h2>
    <form id="createForm">
      <div class="form-group">
        <label>Название задачи *</label>
        <input type="text" id="taskName" required>
      </div>
      <div class="form-group">
        <label>Сложность</label>
        <select id="difficult">
          <option value="easy">Легкая</option>
          <option value="medium">Средняя</option>
          <option value="hard">Сложная</option>
        </select>
      </div>
      <div class="tags-group">
        <label>Теги (выберите из списка)</label>
        <div class="tags-checkboxes" id="tagsCheckboxes"></div>
      </div>
      <div class="form-group">
        <label>Описание задачи (сюда можно вставить примеры)</label>
        <textarea id="description" rows="5" placeholder="Подробное описание, примеры входных/выходных данных..." required></textarea>
        <div class="info-hint">Пользователи увидят только это описание. Настоящие тест-кейсы добавляются ниже.</div>
      </div>
      <div id="testcasesContainer"></div>
      <button type="button" class="add-btn" id="addTestCaseBtn">+ Добавить скрытый тест-кейс</button>
      <div id="message"></div>
      <button type="submit" class="submit-btn">🚀 Создать задачу</button>
    </form>
  </div>
</div>

<script>
  const currentUser = JSON.parse(localStorage.getItem('codecamp_current'));
  if (!currentUser) window.location.replace('index.html');

  // Предопределённые теги
  const AVAILABLE_TAGS = [
    "массивы", "строки", "связные списки", "деревья", "графы",
    "динамическое программирование", "жадные алгоритмы", "сортировка",
    "поиск", "две точки", "стек", "очередь", "рекурсия", 
    "битовые операции", "математика", "симуляция", "хеш-таблицы"
  ];

  function renderTagCheckboxes() {
    const container = document.getElementById('tagsCheckboxes');
    container.innerHTML = AVAILABLE_TAGS.map(tag => `
      <label class="tag-checkbox">
        <input type="checkbox" value="${tag}">
        <span>${tag}</span>
      </label>
    `).join('');
  }
  renderTagCheckboxes();

  let testcaseCounter = 0;
  function addTestCase() {
    const container = document.getElementById('testcasesContainer');
    const div = document.createElement('div');
    div.className = 'testcase-block';
    div.innerHTML = `
      <div class="form-group"><label>Ввод (wanted_input)</label><input type="text" class="tc-input" placeholder='например: "2 3"'></div>
      <div class="form-group"><label>Ожидаемый вывод (wanted_output)</label><input type="text" class="tc-output" placeholder='например: "5"'></div>
      <div class="form-group"><label>Макс. время (мс)</label><input type="number" class="tc-time" value="1000"></div>
      <button type="button" class="add-btn" style="background:rgba(220,53,69,0.2); color:#dc3545;" onclick="this.parentElement.remove()">Удалить</button>
    `;
    container.appendChild(div);
  }
  document.getElementById('addTestCaseBtn').addEventListener('click', addTestCase);
  addTestCase(); // один по умолчанию

  document.getElementById('createForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const task_name = document.getElementById('taskName').value.trim();
    const description = document.getElementById('description').value.trim();
    const difficult = document.getElementById('difficult').value;
    const selectedTags = Array.from(document.querySelectorAll('#tagsCheckboxes input:checked')).map(cb => cb.value);
    const testCaseBlocks = document.querySelectorAll('.testcase-block');
    const testCases = [];
    for (let block of testCaseBlocks) {
      const input = block.querySelector('.tc-input').value.trim();
      const output = block.querySelector('.tc-output').value.trim();
      const max_time_ms = parseInt(block.querySelector('.tc-time').value);
      if (input && output) {
        testCases.push({ wanted_input: input, wanted_output: output, max_time_ms });
      }
    }
    if (!task_name || !description || testCases.length === 0) {
      showMessage('Заполните все поля и добавьте хотя бы один тест-кейс', 'error');
      return;
    }
    // Сохраняем задачу в localStorage
    const tasks = JSON.parse(localStorage.getItem('codecamp_tasks') || '[]');
    if (tasks.find(t => t.name === task_name)) {
      showMessage('Задача с таким именем уже существует', 'error');
      return;
    }
    const newTask = {
      name: task_name,
      description: description,
      difficult: difficult,
      tags: selectedTags,
      testCases: testCases,        // скрытые тест-кейсы
      author: currentUser.name,
      createdAt: new Date().toISOString(),
      complete: 0,
      tried: 0,
      solvedBy: []
    };
    tasks.push(newTask);
    localStorage.setItem('codecamp_tasks', JSON.stringify(tasks));
    showMessage('✅ Задача создана! Перенаправление...', 'success');
    setTimeout(() => window.location.replace('tasks.html'), 1500);
  });

  function showMessage(text, type) {
    const msg = document.getElementById('message');
    msg.className = `message ${type}`;
    msg.textContent = text;
    setTimeout(() => msg.textContent = '', 3000);
  }
</script>
</body>
</html>
